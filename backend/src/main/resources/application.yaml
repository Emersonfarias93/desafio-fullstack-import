spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE}
      minimum-idle: ${DB_MIN_IDLE}
      connection-timeout: ${DB_CONNECTION_TIMEOUT}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID}
      auto-offset-reset: earliest

server:
  port: 8080

app:
  kafka:
    enabled: ${APP_KAFKA_ENABLED}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  import:
    upload-dir: ${IMPORT_UPLOAD_DIR}
    chunk-size: ${IMPORT_CHUNK_SIZE}
    thread-pool-size: ${IMPORT_THREAD_POOL_SIZE}
